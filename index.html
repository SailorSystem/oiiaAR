<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<title>AR Selección</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }

  #menu {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
    font-family: sans-serif;
    z-index: 10;
  }

  button {
    padding: 12px 22px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  #si {
    background: #29b6f6;
    color: black;
  }

  #no {
    background: #eee;
    color: black;
  }

  model-viewer {
    width: 100vw;
    height: 100vh;
    display: none; /* se activa después */
  }
</style>
</head>

<body>

<!-- MENÚ INICIAL SOLO EN CELULAR -->
<div id="menu">
  <h2>¿Deseas abrir la cámara y ver en Realidad Aumentada?</h2>
  <button id="si">Sí, abrir cámara</button>
  <button id="no">No, ver modelo normal</button>
</div>

<!-- VISOR 3D + AR -->
<model-viewer
  id="viewer"
  src="oiiaioooooiai_cat.glb"
  autoplay
  animation-loop
  camera-controls
  exposure="1"
  ar
  ar-modes="webxr scene-viewer"
  disable-tap
  shadow-intensity="0"
>
  <button slot="ar-button" id="arBtn">Ver en AR</button>
</model-viewer>

<!-- AUDIO -->
<audio id="audio" src="oiiaioiiiai.mp3" loop></audio>

<script>
  const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
  const menu = document.getElementById("menu");
  const viewer = document.getElementById("viewer");
  const audio = document.getElementById("audio");

  // PC: no mostrar menú, cargar normal
  if (!isMobile) {
    menu.style.display = "none";
    viewer.style.display = "block";
    audio.play().catch(()=>{});
  }

  // MÓVIL → mostrar menú
  document.getElementById("si").onclick = () => {
    menu.style.display = "none";
    viewer.style.display = "block";

    // usuario aceptó → iniciar AR directamente
    setTimeout(() => {
      viewer.activateAR();
    }, 200);

    // reproducir audio en loop
    audio.play().catch(() => {});
  };

  document.getElementById("no").onclick = () => {
    menu.style.display = "none";
    viewer.style.display = "block";
    // solo mostrar el modelo normal
    audio.play().catch(()=>{});
  };
</script>

</body>
</html>
