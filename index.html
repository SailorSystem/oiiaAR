<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR Demo</title>

  <!-- Librería model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }
    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: black;
    }
  </style>
</head>
<body>

  <!-- AUDIO EXTERNO LOOP -->
  <audio id="audio" src="oiiaioiiiai.mp3" loop></audio>

  <!-- MODELO 3D -->
  <model-viewer id="mv"
    src="oiiaioooooiai_cat.glb"
    autoplay
    animation-loop
    ar
    ar-modes="scene-viewer webxr"
    camera-controls
    exposure="1"
    environment-image="neutral"
    shadow-intensity="1"
    disable-zoom>
  </model-viewer>

<script>
  const audio = document.getElementById("audio");

  // 🔊 Reproducir audio solo después de interacción humana (requisito de iOS/Android)
  document.addEventListener("click", () => {
    audio.play().catch(err => {});
  });

  // 🔊 Reproducir también al entrar al modo AR (Android)
  const mv = document.getElementById("mv");
  mv.addEventListener("ar-status", (event) => {
    if (event.detail.status === "session-started") {
      audio.play().catch(err => {});
    }
  });
</script>

</body>
</html>
