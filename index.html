<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- MODEL VIEWER -->
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<title>AR Auto</title>

<style>
  body {
    margin: 0;
    background: black;
    overflow: hidden;
  }
  model-viewer {
    width: 100vw;
    height: 100vh;
  }
  #overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    font-size: 20px;
    z-index: 10;
  }
  #errorBox {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #ff4c4c;
    padding: 10px 20px;
    border-radius: 10px;
    color: white;
    font-family: sans-serif;
    display: none;
    z-index: 20;
  }
</style>
</head>

<body>

<div id="overlay">Cargando…</div>
<div id="errorBox">No se pudo activar AR. Mostrando modelo normal.</div>

<!-- VISOR 3D + AR -->
<model-viewer id="mv"
  src="oiiaioooooiai_cat.glb"
  autoplay
  animation-loop
  camera-controls
  ar
  ar-modes="webxr scene-viewer"
  exposure="1"
  shadow-intensity="0.8"
  disable-zoom
>
</model-viewer>

<script>
const mv = document.getElementById("mv");
const overlay = document.getElementById("overlay");
const errorBox = document.getElementById("errorBox");

/* 🔊 AUDIO EN LOOP */
const audio = new Audio("oiiaioooooiai.mp3");
audio.loop = true;

/* Reproduce audio cuando se carga el modelo */
mv.addEventListener("load", () => {
  overlay.style.display = "none";
  audio.play().catch(()=>{});
});

/* 🛑 MANEJO DE ERROR: SI ANDROID FALLA AL CARGAR GLB */
mv.addEventListener("error", (err) => {
  console.error("Error al cargar modelo:", err);
  overlay.innerText = "Error al cargar el modelo";
});

/* ⚡ DETECCIÓN DE AR DISPONIBLE */
async function checkAR() {
  try {
    const supportsAR = await mv.canActivateAR;

    if (!supportsAR) {
      console.warn("AR NO disponible en este dispositivo.");
      return; // deja el visor 3D funcionando
    }

    // Auto-activar AR si estamos en Android móvil
    if (/Android/i.test(navigator.userAgent)) {
      mv.activateAR()
      .catch(() => {
        errorBox.style.display = "block";
        setTimeout(()=> errorBox.style.display="none", 4000);
      });
    }
  } catch (e) {
    console.warn("AR falló:", e);
  }
}

/* Ejecutar chequeo de AR cuando todo cargue */
window.addEventListener("DOMContentLoaded", checkAR);
</script>

</body>
</html>
