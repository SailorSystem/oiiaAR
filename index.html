<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Demo</title>

  <!-- Model Viewer (Google) -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    model-viewer {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

  <model-viewer 
    src="oiiaioooooiai_cat.glb"
    ar
    ar-modes="scene-viewer quick-look webxr"
    camera-controls
    autoplay
    shadow-intensity="1"
    exposure="1"
    environment-image="neutral"
    alt="Modelo 3D en AR">
  </model-viewer>

  <audio id="audio" src="oiiaioooooiai_audio.mp3"></audio>

  <script>
    // Reproducir audio cuando el usuario toca la pantalla (requisito de iOS)
    document.addEventListener("click", () => {
      const audio = document.getElementById("audio");
      audio.play().catch(() => {});
    });
  </script>

</body>
</html>
