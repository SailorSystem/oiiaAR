<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Demo</title>

  <!-- Librería model-viewer -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: black; /* fondo negro en escritorio */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    model-viewer {
      width: 100vw;
      height: 100vh;
      background-color: black;
    }
  </style>
</head>

<body>

  <!-- Visor 3D + AR -->
  <model-viewer src="oiiaioooooiai_cat.glb"
                alt="Modelo 3D"
                camera-controls
                auto-rotate
                ar
                ar-modes="scene-viewer webxr quick-look"
                environment-image="neutral"
                exposure="1"
                style="background-color:black">

    <!-- Botón AR personalizado (solo aparece en móvil) -->
    <button slot="ar-button" style="
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 22px;
      background: white;
      border-radius: 30px;
      border: none;
      font-size: 18px;
      cursor: pointer;
      display: none;
    ">
      Ver en AR
    </button>

  </model-viewer>

  <!-- Audio -->
  <audio id="audio" src="oiiaioiiiai.mp3"></audio>

  <script>
    // Reproducir audio cuando el modelo esté listo
    const mv = document.querySelector("model-viewer");
    const audio = document.getElementById("audio");

    mv.addEventListener("load", () => {
      // Safari bloquea autoplay, por eso esto solo funciona en otros navegadores
      audio.play().catch(() => {});
    });

    // Mostrar botón AR solo en móvil
    const arButton = document.querySelector("button[slot='ar-button']");
    if (/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
      arButton.style.display = "block";
    }
  </script>

</body>
</html>
