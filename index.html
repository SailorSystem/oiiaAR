<!DOCTYPE html>
<html>
  <head>
    <title>Gato UIA AR</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.150.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/ar.js@3.3.2/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0; overflow: hidden">
    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="logarithmicDepthBuffer: true;"
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
    >
      <!-- Marker: puedes usar un marcador Hiro para el prototipo -->
      <a-marker preset="hiro">
        <a-entity id="cat-model"></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <audio id="uiaSound" src="./oiiaioiiiai.mp3" preload="auto"></audio>

    <script>
      const loader = new THREE.GLTFLoader();
      const catEntity = document.querySelector("#cat-model");
      const audio = document.getElementById("uiaSound");

      let mixer;

      loader.load(
        "./oiiaioooooiai_cat.glb",
        function (gltf) {
          catEntity.setObject3D("mesh", gltf.scene);

          mixer = new THREE.AnimationMixer(gltf.scene);
          const action = mixer.clipAction(gltf.animations[0]);
          action.play();

          audio.play().catch(() => {
            // iOS requires user action; so play when marker detected
          });

          // Update animation per frame
          catEntity.sceneEl.addEventListener("renderstart", () => {
            catEntity.sceneEl.addEventListener("frame", (e) => {
              if (mixer) mixer.update(e.detail.delta / 1000);
            });
          });
        },
        undefined,
        function (error) {
          console.error(error);
        }
      );

      // Cuando aparece el marcador, reproducimos audio
      document.querySelector("a-marker").addEventListener("markerFound", () => {
        audio.play();
      });
    </script>
  </body>
</html>
