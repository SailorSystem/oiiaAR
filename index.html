<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<title>AR Auto</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}
model-viewer {
  width: 100vw;
  height: 100vh;
}
#overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 20px;
  z-index: 10;
}
</style>
</head>

<body>

<div id="overlay">Cargando experiencia AR...</div>

<model-viewer id="mv"
  src="modelo.glb"
  autoplay
  animation-loop
  camera-controls
  ar
  ar-modes="webxr"
  ar-placement="floor"
  exposure="1"
  shadow-intensity="1">
</model-viewer>

<audio id="audio" src="audio.mp3" loop></audio>

<script>
const mv = document.getElementById("mv");
const overlay = document.getElementById("overlay");
const audio = document.getElementById("audio");

// detectar móvil
const isMobile = /Android|iPhone/i.test(navigator.userAgent);

// intento de AR automático
mv.addEventListener("load", async () => {
  overlay.style.display = "none";

  if (isMobile) {
    try {
      // intenta entrar directo a AR
      await mv.activateAR();
    } catch (e) {
      console.log("AR no soportado → fallback normal");
    }
  }
});

// audio con interacción
document.addEventListener("click", () => {
  audio.play().catch(()=>{});
});

// cuando entra a AR
mv.addEventListener("ar-status", (e) => {
  if (e.detail.status === "session-started") {
    audio.play().catch(()=>{});
  }
});
</script>

</body>
</html>
